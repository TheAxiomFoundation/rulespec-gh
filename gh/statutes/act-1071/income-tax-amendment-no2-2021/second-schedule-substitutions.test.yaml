# Companion fixtures for the Income Tax (Amendment) (No. 2) Act, 2021
# (Act 1071) section 2 — the Second Schedule substitutions in force for the
# 2026 year of assessment. Expected values are computed by hand from the
# verbatim amounts in the cited corpus provision, then verified
# digit-by-digit through the engine. Fixture provenance is manual
# (orchestrator-computed) per the interim convention in axiom-encode#1060:
# the codex/gpt-5.5 backend produced the rule module (run 5d560a5c);
# companion fixtures are written and attested independently with shown
# arithmetic.
#
# Substituted amounts (paragraph 5, presumptive tax based on turnover):
#   rate: three per cent (0.03)
#   band: more than GH¢20,000 and not exceeding GH¢500,000
# Paragraph 2(1)(c)(i): qualifying three-year-average turnover cap 20,000.
# Paragraph 6(1)(b): modified-cash-basis turnover cap 500,000.
# Band history (chain closed against all eleven Income Tax (Amendment)
# Acts): base 2015 20,000-120,000 -> Act 902 20,000-200,000 -> Act 1071
# 20,000-500,000; the rate is three per cent in every version.
# Validation year: 2026.

- name: in_band_turnover_taxed_at_3_percent
  # GH¢60,000 turnover, presumptive taxation applies:
  #   0.03 x 60,000 = 1,800.
  # (60,000 also sits inside GHAMOD GH_2025's narrower 10,000-120,000
  # eligibility band, so this is the shared-band parity scale.)
  period:
    period_kind: tax_year
    start: '2026-01-01'
    end: '2026-12-31'
  input:
    gh:statutes/act-1071/income-tax-amendment-no2-2021/second-schedule-substitutions#input.presumptive_taxation_applies_as_referred_to_in_paragraph_2_1_c_ii: true
    gh:statutes/act-1071/income-tax-amendment-no2-2021/second-schedule-substitutions#input.business_turnover: 60000
    gh:statutes/act-1071/income-tax-amendment-no2-2021/second-schedule-substitutions#input.annual_turnover_average_for_three_consecutive_years: 0
    gh:statutes/act-1071/income-tax-amendment-no2-2021/second-schedule-substitutions#input.turnover_calculated_using_modified_cash_basis: 0
  output:
    gh:statutes/act-1071/income-tax-amendment-no2-2021/second-schedule-substitutions#paragraph_5_turnover_tax_payable: 1800

- name: turnover_at_20000_floor_is_outside_the_band
  # "more than twenty thousand" is strict: exactly 20,000 pays nothing.
  period:
    period_kind: tax_year
    start: '2026-01-01'
    end: '2026-12-31'
  input:
    gh:statutes/act-1071/income-tax-amendment-no2-2021/second-schedule-substitutions#input.presumptive_taxation_applies_as_referred_to_in_paragraph_2_1_c_ii: true
    gh:statutes/act-1071/income-tax-amendment-no2-2021/second-schedule-substitutions#input.business_turnover: 20000
    gh:statutes/act-1071/income-tax-amendment-no2-2021/second-schedule-substitutions#input.annual_turnover_average_for_three_consecutive_years: 0
    gh:statutes/act-1071/income-tax-amendment-no2-2021/second-schedule-substitutions#input.turnover_calculated_using_modified_cash_basis: 0
  output:
    gh:statutes/act-1071/income-tax-amendment-no2-2021/second-schedule-substitutions#paragraph_5_turnover_tax_payable: 0

- name: turnover_at_500000_cap_is_inside_the_band
  # "does not exceed five hundred thousand" is inclusive:
  #   0.03 x 500,000 = 15,000.
  period:
    period_kind: tax_year
    start: '2026-01-01'
    end: '2026-12-31'
  input:
    gh:statutes/act-1071/income-tax-amendment-no2-2021/second-schedule-substitutions#input.presumptive_taxation_applies_as_referred_to_in_paragraph_2_1_c_ii: true
    gh:statutes/act-1071/income-tax-amendment-no2-2021/second-schedule-substitutions#input.business_turnover: 500000
    gh:statutes/act-1071/income-tax-amendment-no2-2021/second-schedule-substitutions#input.annual_turnover_average_for_three_consecutive_years: 0
    gh:statutes/act-1071/income-tax-amendment-no2-2021/second-schedule-substitutions#input.turnover_calculated_using_modified_cash_basis: 0
  output:
    gh:statutes/act-1071/income-tax-amendment-no2-2021/second-schedule-substitutions#paragraph_5_turnover_tax_payable: 15000

- name: turnover_above_500000_is_outside_the_band
  # GH¢600,000 exceeds the cap; the presumptive turnover tax does not apply.
  period:
    period_kind: tax_year
    start: '2026-01-01'
    end: '2026-12-31'
  input:
    gh:statutes/act-1071/income-tax-amendment-no2-2021/second-schedule-substitutions#input.presumptive_taxation_applies_as_referred_to_in_paragraph_2_1_c_ii: true
    gh:statutes/act-1071/income-tax-amendment-no2-2021/second-schedule-substitutions#input.business_turnover: 600000
    gh:statutes/act-1071/income-tax-amendment-no2-2021/second-schedule-substitutions#input.annual_turnover_average_for_three_consecutive_years: 0
    gh:statutes/act-1071/income-tax-amendment-no2-2021/second-schedule-substitutions#input.turnover_calculated_using_modified_cash_basis: 0
  output:
    gh:statutes/act-1071/income-tax-amendment-no2-2021/second-schedule-substitutions#paragraph_5_turnover_tax_payable: 0

- name: presumptive_taxation_not_applying_yields_no_tax
  # In-band turnover but paragraph 2(1)(c)(ii) presumptive taxation does not
  # apply (for example, the individual is VAT-registered or excluded under
  # paragraph 3) -> no presumptive turnover tax.
  period:
    period_kind: tax_year
    start: '2026-01-01'
    end: '2026-12-31'
  input:
    gh:statutes/act-1071/income-tax-amendment-no2-2021/second-schedule-substitutions#input.presumptive_taxation_applies_as_referred_to_in_paragraph_2_1_c_ii: false
    gh:statutes/act-1071/income-tax-amendment-no2-2021/second-schedule-substitutions#input.business_turnover: 60000
    gh:statutes/act-1071/income-tax-amendment-no2-2021/second-schedule-substitutions#input.annual_turnover_average_for_three_consecutive_years: 0
    gh:statutes/act-1071/income-tax-amendment-no2-2021/second-schedule-substitutions#input.turnover_calculated_using_modified_cash_basis: 0
  output:
    gh:statutes/act-1071/income-tax-amendment-no2-2021/second-schedule-substitutions#paragraph_5_turnover_tax_payable: 0

- name: qualifying_and_cash_basis_conditions
  # Paragraph 2(1)(c)(i) as substituted by Act 1071: three-year-average
  # turnover of 18,000 (<= 20,000) -> condition holds. (The substituted
  # limb carries no VAT-registration phrase.)
  # Paragraph 6(1)(b): modified-cash-basis turnover 450,000 (<= 500,000)
  # -> condition holds.
  period:
    period_kind: tax_year
    start: '2026-01-01'
    end: '2026-12-31'
  input:
    gh:statutes/act-1071/income-tax-amendment-no2-2021/second-schedule-substitutions#input.presumptive_taxation_applies_as_referred_to_in_paragraph_2_1_c_ii: false
    gh:statutes/act-1071/income-tax-amendment-no2-2021/second-schedule-substitutions#input.business_turnover: 0
    gh:statutes/act-1071/income-tax-amendment-no2-2021/second-schedule-substitutions#input.annual_turnover_average_for_three_consecutive_years: 18000
    gh:statutes/act-1071/income-tax-amendment-no2-2021/second-schedule-substitutions#input.turnover_calculated_using_modified_cash_basis: 450000
  output:
    gh:statutes/act-1071/income-tax-amendment-no2-2021/second-schedule-substitutions#paragraph_2_1_c_i_turnover_condition: holds
    gh:statutes/act-1071/income-tax-amendment-no2-2021/second-schedule-substitutions#modified_cash_basis_turnover_condition: holds

- name: conditions_fail_above_their_caps
  # Three-year-average 25,000 (> 20,000) and cash-basis turnover 550,000
  # (> 500,000) -> both conditions fail.
  period:
    period_kind: tax_year
    start: '2026-01-01'
    end: '2026-12-31'
  input:
    gh:statutes/act-1071/income-tax-amendment-no2-2021/second-schedule-substitutions#input.presumptive_taxation_applies_as_referred_to_in_paragraph_2_1_c_ii: false
    gh:statutes/act-1071/income-tax-amendment-no2-2021/second-schedule-substitutions#input.business_turnover: 0
    gh:statutes/act-1071/income-tax-amendment-no2-2021/second-schedule-substitutions#input.annual_turnover_average_for_three_consecutive_years: 25000
    gh:statutes/act-1071/income-tax-amendment-no2-2021/second-schedule-substitutions#input.turnover_calculated_using_modified_cash_basis: 550000
  output:
    gh:statutes/act-1071/income-tax-amendment-no2-2021/second-schedule-substitutions#paragraph_2_1_c_i_turnover_condition: not_holds
    gh:statutes/act-1071/income-tax-amendment-no2-2021/second-schedule-substitutions#modified_cash_basis_turnover_condition: not_holds
