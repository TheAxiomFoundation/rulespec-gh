format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: gh/statute/act-1071/income-tax-amendment-no2-2021/second-schedule-substitutions
  summary: |-
    Substitutes paragraph 2(1)(c)(i) so the qualifying limb is an annual turnover of not more than twenty thousand Ghana Cedis computed as a three-year average (the substituted text carries no VAT-registration phrase, unlike the base 2015 limb); substitutes paragraph 5 so turnover-based presumptive tax is three per cent where turnover is more than twenty thousand Ghana Cedis but does not exceed five hundred thousand Ghana Cedis; substitutes paragraph 6(1)(b) so modified cash basis applies where turnover does not exceed five hundred thousand Ghana Cedis.
rules:
  - name: paragraph_2_1_c_i_turnover_maximum
    kind: parameter
    dtype: Money
    unit: GHS
    source: Income Tax (Amendment) (No. 2) Act, 2021 (Act 1071), section 2(a) — Second Schedule paragraph 2(1)(c)(i)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: gh/statute/act-1071/income-tax-amendment-no2-2021/second-schedule-substitutions
              excerpt: "annual turnover of not more than twenty thousand Ghana Cedis"
    versions:
      - effective_from: '2021-12-30'
        formula: |-
          20000

  - name: paragraph_5_turnover_lower_threshold
    kind: parameter
    dtype: Money
    unit: GHS
    source: Income Tax (Amendment) (No. 2) Act, 2021 (Act 1071), section 2(b) — Second Schedule paragraph 5
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: gh/statute/act-1071/income-tax-amendment-no2-2021/second-schedule-substitutions
              excerpt: "turnover is more than twenty thousand Ghana Cedis"
    versions:
      - effective_from: '2021-12-30'
        formula: |-
          20000

  - name: paragraph_5_turnover_maximum
    kind: parameter
    dtype: Money
    unit: GHS
    source: Income Tax (Amendment) (No. 2) Act, 2021 (Act 1071), section 2(b) — Second Schedule paragraph 5
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: gh/statute/act-1071/income-tax-amendment-no2-2021/second-schedule-substitutions
              excerpt: "does not exceed five hundred thousand Ghana Cedis"
    versions:
      - effective_from: '2021-12-30'
        formula: |-
          500000

  - name: paragraph_5_turnover_tax_rate
    kind: parameter
    dtype: Rate
    source: Income Tax (Amendment) (No. 2) Act, 2021 (Act 1071), section 2(b) — Second Schedule paragraph 5
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: gh/statute/act-1071/income-tax-amendment-no2-2021/second-schedule-substitutions
              excerpt: "is three per cent of the turnover"
    versions:
      - effective_from: '2021-12-30'
        formula: |-
          0.03

  - name: modified_cash_basis_turnover_maximum
    kind: parameter
    dtype: Money
    unit: GHS
    source: Income Tax (Amendment) (No. 2) Act, 2021 (Act 1071), section 2(c) — Second Schedule paragraph 6(1)(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: gh/statute/act-1071/income-tax-amendment-no2-2021/second-schedule-substitutions
              excerpt: "does not exceed five hundred thousand Ghana Cedis"
    versions:
      - effective_from: '2021-12-30'
        formula: |-
          500000

  - name: paragraph_2_1_c_i_turnover_condition
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: Income Tax (Amendment) (No. 2) Act, 2021 (Act 1071), section 2(a) — Second Schedule paragraph 2(1)(c)(i)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: gh/statute/act-1071/income-tax-amendment-no2-2021/second-schedule-substitutions
              excerpt: "has an annual turnover of not more than twenty thousand Ghana Cedis from the business computed as an average of the turnover for three consecutive years ending in the year of assessment"
    versions:
      - effective_from: '2021-12-30'
        formula: |-
          annual_turnover_average_for_three_consecutive_years <= paragraph_2_1_c_i_turnover_maximum

  - name: paragraph_5_turnover_tax_payable
    kind: derived
    entity: Person
    dtype: Money
    unit: GHS
    period: Year
    source: Income Tax (Amendment) (No. 2) Act, 2021 (Act 1071), section 2(b) — Second Schedule paragraph 5
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: gh/statute/act-1071/income-tax-amendment-no2-2021/second-schedule-substitutions
              excerpt: "is three per cent of the turnover of the business"
    versions:
      - effective_from: '2021-12-30'
        formula: |-
          if presumptive_taxation_applies_as_referred_to_in_paragraph_2_1_c_ii and business_turnover > paragraph_5_turnover_lower_threshold and business_turnover <= paragraph_5_turnover_maximum: paragraph_5_turnover_tax_rate * business_turnover else: 0

  - name: modified_cash_basis_turnover_condition
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: Income Tax (Amendment) (No. 2) Act, 2021 (Act 1071), section 2(c) — Second Schedule paragraph 6(1)(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: gh/statute/act-1071/income-tax-amendment-no2-2021/second-schedule-substitutions
              excerpt: "the turnover of that individual does not exceed five hundred thousand Ghana Cedis, calculated using the modified cash basis"
    versions:
      - effective_from: '2021-12-30'
        formula: |-
          turnover_calculated_using_modified_cash_basis <= modified_cash_basis_turnover_maximum
