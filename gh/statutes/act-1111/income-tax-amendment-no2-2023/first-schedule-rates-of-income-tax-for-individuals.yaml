format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: gh/statute/act-1111/income-tax-amendment-no2-2023/first-schedule-rates-of-income-tax-for-individuals
  summary: |-
    "the chargeable income of a resident individual for a year of assessment is taxed at the following rates: First GH¢5,880 Nil; Next GH¢1,320 5 per cent; Next GH¢1,560 10 per cent; Next GH¢38,000 17.5 per cent; Next GH¢192,000 25 per cent; Next GH¢366,240 30 per cent; Exceeding GH¢600,000 35 per cent"
rules:
  - name: resident_individual_income_tax_band
    kind: derived
    entity: Person
    dtype: Integer
    period: Year
    source: First Schedule to Act 896, paragraph 1(1), as substituted by Act 1111
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: gh/statute/act-1111/income-tax-amendment-no2-2023/first-schedule-rates-of-income-tax-for-individuals
              excerpt: "First GH¢5,880; Next GH¢1,320; Next GH¢1,560; Next GH¢38,000; Next GH¢192,000; Next GH¢366,240; Exceeding GH¢600,000"
    versions:
      - effective_from: '2023-12-29'
        formula: |-
          if chargeable_income <= first_band_upper_bound: 0 else: if chargeable_income <= second_band_upper_bound: 1 else: if chargeable_income <= third_band_upper_bound: 2 else: if chargeable_income <= fourth_band_upper_bound: 3 else: if chargeable_income <= fifth_band_upper_bound: 4 else: if chargeable_income <= sixth_band_upper_bound: 5 else: 6
  - name: first_band_upper_bound
    kind: parameter
    dtype: Money
    unit: GHS
    period: Year
    source: First Schedule to Act 896, paragraph 1(1), item 1, as substituted by Act 1111
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: gh/statute/act-1111/income-tax-amendment-no2-2023/first-schedule-rates-of-income-tax-for-individuals
              excerpt: "First GH¢5,880 Nil"
    versions:
      - effective_from: '2023-12-29'
        formula: |-
          5880
  - name: second_band_size
    kind: parameter
    dtype: Money
    unit: GHS
    period: Year
    source: First Schedule to Act 896, paragraph 1(1), item 2, as substituted by Act 1111
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: gh/statute/act-1111/income-tax-amendment-no2-2023/first-schedule-rates-of-income-tax-for-individuals
              excerpt: "Next GH¢1,320 5 per cent"
    versions:
      - effective_from: '2023-12-29'
        formula: |-
          1320
  - name: third_band_size
    kind: parameter
    dtype: Money
    unit: GHS
    period: Year
    source: First Schedule to Act 896, paragraph 1(1), item 3, as substituted by Act 1111
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: gh/statute/act-1111/income-tax-amendment-no2-2023/first-schedule-rates-of-income-tax-for-individuals
              excerpt: "Next GH¢1,560 10 per cent"
    versions:
      - effective_from: '2023-12-29'
        formula: |-
          1560
  - name: fourth_band_size
    kind: parameter
    dtype: Money
    unit: GHS
    period: Year
    source: First Schedule to Act 896, paragraph 1(1), item 4, as substituted by Act 1111
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: gh/statute/act-1111/income-tax-amendment-no2-2023/first-schedule-rates-of-income-tax-for-individuals
              excerpt: "Next GH¢38,000 17.5 per cent"
    versions:
      - effective_from: '2023-12-29'
        formula: |-
          38000
  - name: fifth_band_size
    kind: parameter
    dtype: Money
    unit: GHS
    period: Year
    source: First Schedule to Act 896, paragraph 1(1), item 5, as substituted by Act 1111
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: gh/statute/act-1111/income-tax-amendment-no2-2023/first-schedule-rates-of-income-tax-for-individuals
              excerpt: "Next GH¢192,000 25 per cent"
    versions:
      - effective_from: '2023-12-29'
        formula: |-
          192000
  - name: sixth_band_size
    kind: parameter
    dtype: Money
    unit: GHS
    period: Year
    source: First Schedule to Act 896, paragraph 1(1), item 6, as substituted by Act 1111
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: gh/statute/act-1111/income-tax-amendment-no2-2023/first-schedule-rates-of-income-tax-for-individuals
              excerpt: "Next GH¢366,240 30 per cent"
    versions:
      - effective_from: '2023-12-29'
        formula: |-
          366240
  - name: second_band_upper_bound
    kind: parameter
    dtype: Money
    unit: GHS
    period: Year
    source: First Schedule to Act 896, paragraph 1(1), items 1-2, as substituted by Act 1111
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: gh/statute/act-1111/income-tax-amendment-no2-2023/first-schedule-rates-of-income-tax-for-individuals
              excerpt: "First GH¢5,880; Next GH¢1,320"
    versions:
      - effective_from: '2023-12-29'
        formula: |-
          first_band_upper_bound + second_band_size
  - name: third_band_upper_bound
    kind: parameter
    dtype: Money
    unit: GHS
    period: Year
    source: First Schedule to Act 896, paragraph 1(1), items 1-3, as substituted by Act 1111
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: gh/statute/act-1111/income-tax-amendment-no2-2023/first-schedule-rates-of-income-tax-for-individuals
              excerpt: "First GH¢5,880; Next GH¢1,320; Next GH¢1,560"
    versions:
      - effective_from: '2023-12-29'
        formula: |-
          second_band_upper_bound + third_band_size
  - name: fourth_band_upper_bound
    kind: parameter
    dtype: Money
    unit: GHS
    period: Year
    source: First Schedule to Act 896, paragraph 1(1), items 1-4, as substituted by Act 1111
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: gh/statute/act-1111/income-tax-amendment-no2-2023/first-schedule-rates-of-income-tax-for-individuals
              excerpt: "Next GH¢38,000"
    versions:
      - effective_from: '2023-12-29'
        formula: |-
          third_band_upper_bound + fourth_band_size
  - name: fifth_band_upper_bound
    kind: parameter
    dtype: Money
    unit: GHS
    period: Year
    source: First Schedule to Act 896, paragraph 1(1), items 1-5, as substituted by Act 1111
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: gh/statute/act-1111/income-tax-amendment-no2-2023/first-schedule-rates-of-income-tax-for-individuals
              excerpt: "Next GH¢192,000"
    versions:
      - effective_from: '2023-12-29'
        formula: |-
          fourth_band_upper_bound + fifth_band_size
  - name: sixth_band_upper_bound
    kind: parameter
    dtype: Money
    unit: GHS
    period: Year
    source: First Schedule to Act 896, paragraph 1(1), items 1-6, as substituted by Act 1111
    metadata:
      # The First Schedule labels the top band "Exceeding GH¢600,000", but the
      # six explicit band widths (First 5,880; Next 1,320; 1,560; 38,000;
      # 192,000; 366,240) sum to GH¢605,000, which is where the 30% band ends
      # and the 35% band begins. GRA PAYE practice and published annual bands
      # operate the 35% band from the cumulative 605,000, so the top-band lower
      # bound is derived from the verbatim band widths rather than the labelled
      # literal, keeping the schedule internally consistent.
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: gh/statute/act-1111/income-tax-amendment-no2-2023/first-schedule-rates-of-income-tax-for-individuals
              excerpt: "First GH¢5,880; Next GH¢1,320; Next GH¢1,560; Next GH¢38,000; Next GH¢192,000; Next GH¢366,240"
    versions:
      - effective_from: '2023-12-29'
        formula: |-
          fifth_band_upper_bound + sixth_band_size
  - name: resident_individual_income_tax_rate
    kind: parameter
    dtype: Rate
    indexed_by: resident_individual_income_tax_band
    source: First Schedule to Act 896, paragraph 1(1), rate table, as substituted by Act 1111
    metadata:
      proof:
        atoms:
          - path: versions[0].values
            kind: parameter_table
            source:
              corpus_citation_path: gh/statute/act-1111/income-tax-amendment-no2-2023/first-schedule-rates-of-income-tax-for-individuals
              table:
                header: "Rates of income tax for individuals"
                row_key: "chargeable income band"
                column_key: "rate of tax"
    versions:
      - effective_from: '2023-12-29'
        values:
          0: 0
          1: 0.05
          2: 0.10
          3: 0.175
          4: 0.25
          5: 0.30
          6: 0.35
  - name: resident_individual_income_tax
    kind: derived
    entity: Person
    dtype: Money
    unit: GHS
    period: Year
    source: First Schedule to Act 896, paragraph 1(1), as substituted by Act 1111
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: gh/statute/act-1111/income-tax-amendment-no2-2023/first-schedule-rates-of-income-tax-for-individuals
              excerpt: "the chargeable income of a resident individual for a year of assessment is taxed at the following rates"
    versions:
      - effective_from: '2023-12-29'
        formula: |-
          if chargeable_income <= first_band_upper_bound: 0 else: if chargeable_income <= second_band_upper_bound: (chargeable_income - first_band_upper_bound) * resident_individual_income_tax_rate[1] else: if chargeable_income <= third_band_upper_bound: (second_band_size * resident_individual_income_tax_rate[1]) + ((chargeable_income - second_band_upper_bound) * resident_individual_income_tax_rate[2]) else: if chargeable_income <= fourth_band_upper_bound: (second_band_size * resident_individual_income_tax_rate[1]) + (third_band_size * resident_individual_income_tax_rate[2]) + ((chargeable_income - third_band_upper_bound) * resident_individual_income_tax_rate[3]) else: if chargeable_income <= fifth_band_upper_bound: (second_band_size * resident_individual_income_tax_rate[1]) + (third_band_size * resident_individual_income_tax_rate[2]) + (fourth_band_size * resident_individual_income_tax_rate[3]) + ((chargeable_income - fourth_band_upper_bound) * resident_individual_income_tax_rate[4]) else: if chargeable_income <= sixth_band_upper_bound: (second_band_size * resident_individual_income_tax_rate[1]) + (third_band_size * resident_individual_income_tax_rate[2]) + (fourth_band_size * resident_individual_income_tax_rate[3]) + (fifth_band_size * resident_individual_income_tax_rate[4]) + ((chargeable_income - fifth_band_upper_bound) * resident_individual_income_tax_rate[5]) else: (second_band_size * resident_individual_income_tax_rate[1]) + (third_band_size * resident_individual_income_tax_rate[2]) + (fourth_band_size * resident_individual_income_tax_rate[3]) + (fifth_band_size * resident_individual_income_tax_rate[4]) + (sixth_band_size * resident_individual_income_tax_rate[5]) + ((chargeable_income - sixth_band_upper_bound) * resident_individual_income_tax_rate[6])
