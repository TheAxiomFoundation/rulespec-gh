format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_paths:
      - gh/statute/act-1141/energy-sector-levies-amendment-2025/schedule-shortfall-row-substituted
      - gh/statute/act-1145/energy-sector-levies-amendment-no2-2025/schedule-road-and-energy-fund-rows
      - gh/statute/act-1135/energy-sector-levies-2025/schedule-types-of-levies
  deferred_outputs:
    - output: gh:statutes/act-1141/energy-sector-levies-amendment-2025/schedule-shortfall-row-substituted#naphtha_fuel_levies_amount
      reason: Naphtha is not a household fuel in the GLSS/GHAMOD consumption surface; the levy amount output is deferred until an industrial-fuel surface is encoded.
      source_values:
        - gh:statutes/act-1141/energy-sector-levies-amendment-2025/schedule-shortfall-row-substituted#naphtha_shortfall_debt_repayment_levy_rate_per_litre
    - output: gh:statutes/act-1141/energy-sector-levies-amendment-2025/schedule-shortfall-row-substituted#fuel_oil_fuel_levies_amount
      reason: Fuel oil is not a household fuel in the GLSS/GHAMOD consumption surface; deferred with its rate until an industrial-fuel surface is encoded.
      source_values:
        - gh:statutes/act-1141/energy-sector-levies-amendment-2025/schedule-shortfall-row-substituted#fuel_oil_shortfall_debt_repayment_levy_rate_per_litre
    - output: gh:statutes/act-1141/energy-sector-levies-amendment-2025/schedule-shortfall-row-substituted#marine_gas_oil_fuel_levies_amount
      reason: Marine gas oil is not a household fuel; deferred with its rate until a marine-fuel surface is encoded.
      source_values:
        - gh:statutes/act-1141/energy-sector-levies-amendment-2025/schedule-shortfall-row-substituted#marine_gas_oil_shortfall_debt_repayment_levy_rate_per_litre
  summary: |-
    Act 1141 amends Act 1135 by substituting the Schedule's second row for the Energy Sector Shortfall and Debt Repayment Levy: GHp 195 per litre on petrol; GHp 193 per litre on diesel; GHp 195 per litre on naphtha; GHp 24 per litre on fuel oil; GHp 23 per litre on marine gas oil; and GHp 73 per kilogramme on liquefied petroleum gas.
