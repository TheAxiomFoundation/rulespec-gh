    kind: parameter
    dtype: Money
    unit: GHp
    source: Act 1145 Schedule third row substituted (Road Fund Levy)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: gh/statute/act-1145/energy-sector-levies-amendment-no2-2025/schedule-road-and-energy-fund-rows
              excerpt: "GHp 48 per"
    versions:
      - effective_from: '2025-07-29'
        formula: '48'
  - name: act1145_energy_fund_levy_rate_per_litre
    kind: parameter
    dtype: Money
    unit: GHp
    source: Act 1145 Schedule fourth row substituted (Energy Fund Levy)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: gh/statute/act-1145/energy-sector-levies-amendment-no2-2025/schedule-road-and-energy-fund-rows
              excerpt: "Ghp1 per"
