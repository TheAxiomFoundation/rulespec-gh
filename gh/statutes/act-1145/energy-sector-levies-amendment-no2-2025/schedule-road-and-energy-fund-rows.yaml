format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: gh/statute/act-1145/energy-sector-levies-amendment-no2-2025/schedule-road-and-energy-fund-rows
  deferred_outputs:
    - output: gh:statutes/act-1145/energy-sector-levies-amendment-no2-2025/schedule-road-and-energy-fund-rows#road_and_energy_fund_levies_amount
      reason: The affected fuel-specific combined outputs are encoded by the importing Act 1141 module, which supplies the Shortfall and Debt Repayment Levy rates and consumption inputs.
      source_values:
        - gh:statutes/act-1145/energy-sector-levies-amendment-no2-2025/schedule-road-and-energy-fund-rows#act1145_road_fund_levy_rate_per_litre
        - gh:statutes/act-1145/energy-sector-levies-amendment-no2-2025/schedule-road-and-energy-fund-rows#act1145_energy_fund_levy_rate_per_litre
        - gh:statutes/act-1145/energy-sector-levies-amendment-no2-2025/schedule-road-and-energy-fund-rows#act1145_kerosene_energy_fund_levy_rate_per_kilogramme
  summary: |-
    Act 1145 substitutes the Road Fund Levy row at GHp 48 per litre and the
    Energy Fund Levy row at GHp 1 per litre, with GH 1 per kilogramme on
    kerosene.
rules:
