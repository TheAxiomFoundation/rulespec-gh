format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: gh/statute/act-1108/excise-duty-amendment-no2-2023/first-schedule-goods-liable-to-excise-duty
  deferred_outputs:
    - output: gh:statutes/act-1108/excise-duty-amendment-no2-2023/first-schedule-goods-liable-to-excise-duty#waters_and_non_alcoholic_beverages_excise_amount
      reason: The waters rows (tariff no. 1(a)(i)-(iii)) of the scanned print carry OCR-garbled rate text, so their amounts cannot be grounded verbatim; deferred until a cleaner print of the Act 1108 schedule is captured.
    - output: gh:statutes/act-1108/excise-duty-amendment-no2-2023/first-schedule-goods-liable-to-excise-duty#distilled_spirits_excise_amount
      reason: The distilled/rectified spirits limb (tariff no. 6(a)) and the denatured limb are OCR-garbled in the scanned print; the blended/compounded limb (verbatim-clean, 50 per centum) is encoded instead, and this limb is deferred until a cleaner print is captured.
  summary: |-
    The Excise Duty (Amendment) (No. 2) Act, 2023 (Act 1108, assent and
    gazette 29 December 2023) substitutes the whole First Schedule of the
    Excise Duty Act, 2014 (Act 878) — the complete ad-valorem and specific
    excise table in force for 2024 through 2026 (no later Excise Duty
    (Amendment) Act exists). Encoded rows, on the ex-factory price unless
    stated: fruit juices 20 per centum; other non-alcoholic drinks 17.5 per
    centum; malt drink banded by percentage use of local raw material (20 /
    12.5 / 10 per centum); beer and stout other than indigenous beer banded
    the same way (47.5 / 32.5 / 10 per centum); wines including sparkling
    wine 45 per centum; blended or compounded spirits 50 per centum;
    "Akpeteshie" 20 per centum; cigarettes 50 per centum plus a specific
    duty of 28 pesewas per stick; negrohead and snuff GH¢280 per
    kilogramme; electronic cigarette liquids 50 per centum plus 50 pesewas
    per millilitre; plastic and plastic products 5 per centum. The waters
    rows and the distilled/denatured spirits limbs are deferred
    (OCR-garbled rate text in the scanned print).
