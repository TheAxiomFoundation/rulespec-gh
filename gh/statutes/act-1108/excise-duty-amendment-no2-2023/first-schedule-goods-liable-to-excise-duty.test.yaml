    gh:statutes/act-1108/excise-duty-amendment-no2-2023/first-schedule-goods-liable-to-excise-duty#input.wine_ex_factory_value: 2000
    gh:statutes/act-1108/excise-duty-amendment-no2-2023/first-schedule-goods-liable-to-excise-duty#input.blended_spirits_ex_factory_value: 1000
    gh:statutes/act-1108/excise-duty-amendment-no2-2023/first-schedule-goods-liable-to-excise-duty#input.akpeteshie_ex_factory_value: 500
    gh:statutes/act-1108/excise-duty-amendment-no2-2023/first-schedule-goods-liable-to-excise-duty#input.fruit_juice_ex_factory_value: 0
    gh:statutes/act-1108/excise-duty-amendment-no2-2023/first-schedule-goods-liable-to-excise-duty#input.other_non_alcoholic_drinks_ex_factory_value: 0
    gh:statutes/act-1108/excise-duty-amendment-no2-2023/first-schedule-goods-liable-to-excise-duty#input.cigarette_ex_factory_value_ghp: 0
    gh:statutes/act-1108/excise-duty-amendment-no2-2023/first-schedule-goods-liable-to-excise-duty#input.cigarette_sticks: 0
    gh:statutes/act-1108/excise-duty-amendment-no2-2023/first-schedule-goods-liable-to-excise-duty#input.snuff_and_negrohead_kilogrammes: 0
    gh:statutes/act-1108/excise-duty-amendment-no2-2023/first-schedule-goods-liable-to-excise-duty#input.eliquid_ex_factory_value_ghp: 0
    gh:statutes/act-1108/excise-duty-amendment-no2-2023/first-schedule-goods-liable-to-excise-duty#input.eliquid_millilitres: 0
    gh:statutes/act-1108/excise-duty-amendment-no2-2023/first-schedule-goods-liable-to-excise-duty#input.plastics_ex_factory_value: 0
  output:
    gh:statutes/act-1108/excise-duty-amendment-no2-2023/first-schedule-goods-liable-to-excise-duty#beer_excise_amount: 100
    gh:statutes/act-1108/excise-duty-amendment-no2-2023/first-schedule-goods-liable-to-excise-duty#malt_drink_excise_amount: 200
    gh:statutes/act-1108/excise-duty-amendment-no2-2023/first-schedule-goods-liable-to-excise-duty#wine_excise_amount: 900
    gh:statutes/act-1108/excise-duty-amendment-no2-2023/first-schedule-goods-liable-to-excise-duty#blended_spirits_excise_amount: 500
    gh:statutes/act-1108/excise-duty-amendment-no2-2023/first-schedule-goods-liable-to-excise-duty#akpeteshie_excise_amount: 100

- name: tobacco_eliquid_plastics_and_soft_drinks
  # Cigarettes (GHp): 0.50 x 100,000 + 28 x 400 sticks = 50,000 + 11,200 =
  # 61,200 GHp. Snuff/negrohead: 280 x 2 kg = 560 GHS. E-liquid (GHp):
  # 0.50 x 10,000 + 50 x 100 ml = 5,000 + 5,000 = 10,000 GHp.
  # Plastics: 5% x 10,000 = 500. Juices: 20% x 1,000 = 200.
  # Other non-alcoholic drinks: 17.5% x 2,000 = 350.
  period:
    period_kind: tax_year
    start: '2026-01-01'
    end: '2026-12-31'
  input:
    gh:statutes/act-1108/excise-duty-amendment-no2-2023/first-schedule-goods-liable-to-excise-duty#input.beer_local_raw_material_share: 0
