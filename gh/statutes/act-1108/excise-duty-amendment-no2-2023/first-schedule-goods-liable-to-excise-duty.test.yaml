    gh:statutes/act-1108/excise-duty-amendment-no2-2023/first-schedule-goods-liable-to-excise-duty#input.fruit_juice_ex_factory_value: 1000
    gh:statutes/act-1108/excise-duty-amendment-no2-2023/first-schedule-goods-liable-to-excise-duty#input.other_non_alcoholic_drinks_ex_factory_value: 2000
    gh:statutes/act-1108/excise-duty-amendment-no2-2023/first-schedule-goods-liable-to-excise-duty#input.cigarette_ex_factory_value_ghp: 100000
    gh:statutes/act-1108/excise-duty-amendment-no2-2023/first-schedule-goods-liable-to-excise-duty#input.cigarette_sticks: 400
    gh:statutes/act-1108/excise-duty-amendment-no2-2023/first-schedule-goods-liable-to-excise-duty#input.snuff_and_negrohead_kilogrammes: 2
