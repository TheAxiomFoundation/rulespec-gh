    end: '2025-12-31'
  input:
    gh:statutes/act-1068/covid-19-health-recovery-levy-2021/section-1-imposition-of-levy#input.supply_of_goods_or_services_made_in_country: false
    gh:statutes/act-1068/covid-19-health-recovery-levy-2021/section-1-imposition-of-levy#input.supply_is_exempt_goods_or_services: false
    gh:statutes/act-1068/covid-19-health-recovery-levy-2021/section-1-imposition-of-levy#input.import_of_goods_or_services: false
    gh:statutes/act-1068/covid-19-health-recovery-levy-2021/section-1-imposition-of-levy#input.import_is_exempt_import: false
    gh:statutes/act-1068/covid-19-health-recovery-levy-2021/section-1-imposition-of-levy#input.taxable_supply_or_import_value: 60000
    gh:statutes/act-1068/covid-19-health-recovery-levy-2021/section-1-imposition-of-levy#input.person_charges_value_added_tax_flat_rate: false
    gh:statutes/act-1068/covid-19-health-recovery-levy-2021/section-1-imposition-of-levy#input.person_makes_supply_of_goods_or_services: false
  output:
    gh:statutes/act-1068/covid-19-health-recovery-levy-2021/section-1-imposition-of-levy#covid_health_recovery_levy_applies_to_transaction: not_holds
    gh:statutes/act-1068/covid-19-health-recovery-levy-2021/section-1-imposition-of-levy#covid_health_recovery_levy_amount: 0

- name: vat_flat_rate_person_also_charges_the_levy
  # Section 1(3): a person who charges the VAT flat rate charges the Levy
  # on the supply of goods or services.
  period:
    period_kind: tax_year
    start: '2025-01-01'
    end: '2025-12-31'
  input:
    gh:statutes/act-1068/covid-19-health-recovery-levy-2021/section-1-imposition-of-levy#input.supply_of_goods_or_services_made_in_country: true
    gh:statutes/act-1068/covid-19-health-recovery-levy-2021/section-1-imposition-of-levy#input.supply_is_exempt_goods_or_services: false
    gh:statutes/act-1068/covid-19-health-recovery-levy-2021/section-1-imposition-of-levy#input.import_of_goods_or_services: false
    gh:statutes/act-1068/covid-19-health-recovery-levy-2021/section-1-imposition-of-levy#input.import_is_exempt_import: false
    gh:statutes/act-1068/covid-19-health-recovery-levy-2021/section-1-imposition-of-levy#input.taxable_supply_or_import_value: 30000
    gh:statutes/act-1068/covid-19-health-recovery-levy-2021/section-1-imposition-of-levy#input.person_charges_value_added_tax_flat_rate: true
    gh:statutes/act-1068/covid-19-health-recovery-levy-2021/section-1-imposition-of-levy#input.person_makes_supply_of_goods_or_services: true
  output:
    gh:statutes/act-1068/covid-19-health-recovery-levy-2021/section-1-imposition-of-levy#vat_flat_rate_person_charges_covid_health_recovery_levy: holds
    gh:statutes/act-1068/covid-19-health-recovery-levy-2021/section-1-imposition-of-levy#covid_health_recovery_levy_amount: 300

- name: levy_repealed_for_2026
  # Act 1150 repeals Act 1068 with effect from 10 December 2025; a 2026
  # supply bears no levy (rate version 0 from 2025-12-10).
  period:
    period_kind: tax_year
    start: '2026-01-01'
    end: '2026-12-31'
  input:
    gh:statutes/act-1068/covid-19-health-recovery-levy-2021/section-1-imposition-of-levy#input.supply_of_goods_or_services_made_in_country: true
    gh:statutes/act-1068/covid-19-health-recovery-levy-2021/section-1-imposition-of-levy#input.supply_is_exempt_goods_or_services: false
    gh:statutes/act-1068/covid-19-health-recovery-levy-2021/section-1-imposition-of-levy#input.import_of_goods_or_services: false
