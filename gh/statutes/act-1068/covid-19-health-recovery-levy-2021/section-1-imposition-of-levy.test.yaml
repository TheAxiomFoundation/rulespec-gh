    gh:statutes/act-1068/covid-19-health-recovery-levy-2021/section-1-imposition-of-levy#input.import_is_exempt_import: false
    gh:statutes/act-1068/covid-19-health-recovery-levy-2021/section-1-imposition-of-levy#input.taxable_supply_or_import_value: 10000
    gh:statutes/act-1068/covid-19-health-recovery-levy-2021/section-1-imposition-of-levy#input.person_charges_value_added_tax_flat_rate: false
    gh:statutes/act-1068/covid-19-health-recovery-levy-2021/section-1-imposition-of-levy#input.person_makes_supply_of_goods_or_services: false
  output:
    gh:statutes/act-1068/covid-19-health-recovery-levy-2021/section-1-imposition-of-levy#covid_health_recovery_levy_applies_to_transaction: holds
    gh:statutes/act-1068/covid-19-health-recovery-levy-2021/section-1-imposition-of-levy#covid_health_recovery_levy_amount: 100

