format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: gh/statute/act-896/income-tax-2015/first-schedule-8-rates-of-withholding-tax
  summary: |-
    First Schedule paragraph 8(1)(b) sets the rates of tax withheld from
    payments to which section 115 applies (as substituted by Act 1134 s.3:
    dividends, interest, natural resource payments, rent, royalties and
    realisation consideration): dividends eight percent; interest paid to
    individuals one percent (narrowed by Act 907 s.1, which inserts section
    7(1)(p)/(q) exempting interest paid to an individual by a resident
    financial institution or on Government of Ghana bonds and unit-trust/
    mutual-fund distributions); any other interest eight percent; rent paid
    to an individual at eight percent (residential) or fifteen percent
    (non-residential), final under section 119(1)(b); rent paid to a person
    other than an individual at the same rates; and natural resource
    payments and royalties fifteen percent. Dividends paid by a resident
    company are final under section 119(1)(a). The lottery row was deleted
    (Act 956; a 10% row re-added by Act 1094 was deleted again by Act 1134,
    which also removed winnings from section 115(1)). None of the encoded
    rows was amended between 2015 and the 2026 year of assessment (chain
    closed against all eleven Income Tax (Amendment) Acts). Paragraph
    8(1)(a) (section 114 rates), 8(1)(c) (section 116 rates) and paragraphs
    8(2)-(3) are outside this slice's scope, as are the Act 1094 realisation
    rows (xi)-(xii).
