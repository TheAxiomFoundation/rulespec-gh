# Companion fixtures for the Act 896 Fifth Schedule personal reliefs as
# amended by the Income Tax (Amendment) Act, 2019 (Act 1007), section 2.
# Expected values are computed by hand from the verbatim substituted
# amounts in the cited corpus provisions, then verified digit-by-digit
# through the engine. Fixture provenance is manual (orchestrator-computed)
# per the interim convention in axiom-encode#1060: the codex/gpt-5.5
# backend produces the rule; companion fixtures are written and attested
# independently with shown arithmetic.
#
# Amounts in force for 2026 (Act 1007 s.2 substitutions into Fifth Schedule
# paragraph 1, in currency points; s.133: "currency point" means one Cedi):
#   (a) dependant spouse or at least two dependant children   GH¢1,200
#   (b) disability relief                 25% of assessable business/
#                                         employment income (unamended)
#   (c) sixty years of age and above                          GH¢1,500
#   (d) child education, per child or ward (maximum three)    GH¢600
#   (e) aged dependant relative, 60+ (maximum two)            GH¢1,000
#   (f) professional/technical/vocational training cost, cap  GH¢2,000
# Validation year: 2026. No later amendment touches the Fifth Schedule:
# checked against Act 1017 (s.94), Act 1066 (Sixth Schedule), Act 1071
# (First/Second/Sixth), Act 1094 (sections + First/Fourth), Act 1111
# (First Schedule paragraph 1) and the Income Tax (Amendment) Act, 2025 —
# whose Assembly Press print reads Act 1134 (the Act 1111 fixture comment's
# "Act 1129" followed published tax alerts; the print number governs) —
# which amends ss. 6/85/115/119 and First Schedule paragraph 8 only.

- name: no_qualifying_conditions_all_reliefs_zero
  # No relief condition is met, so every relief is zero and the section 51
  # deduction total is zero.
  period:
    period_kind: tax_year
    start: '2026-01-01'
    end: '2026-12-31'
  input:
    gh:statutes/act-896/income-tax-2015/fifth-schedule#input.has_dependant_spouse: false
    gh:statutes/act-896/income-tax-2015/fifth-schedule#input.dependant_child_count: 0
    gh:statutes/act-896/income-tax-2015/fifth-schedule#input.has_disability: false
    gh:statutes/act-896/income-tax-2015/fifth-schedule#input.assessable_business_or_employment_income: 0
    gh:statutes/act-896/income-tax-2015/fifth-schedule#input.age: 40
    gh:statutes/act-896/income-tax-2015/fifth-schedule#input.sponsored_children_in_education_count: 0
    gh:statutes/act-896/income-tax-2015/fifth-schedule#input.aged_dependant_relative_count: 0
    gh:statutes/act-896/income-tax-2015/fifth-schedule#input.has_undergone_skills_update_training: false
    gh:statutes/act-896/income-tax-2015/fifth-schedule#input.skills_update_training_cost: 0
  output:
    gh:statutes/act-896/income-tax-2015/fifth-schedule#dependant_spouse_or_children_personal_relief: 0
    gh:statutes/act-896/income-tax-2015/fifth-schedule#disability_personal_relief: 0
    gh:statutes/act-896/income-tax-2015/fifth-schedule#old_age_personal_relief: 0
    gh:statutes/act-896/income-tax-2015/fifth-schedule#child_education_personal_relief: 0
    gh:statutes/act-896/income-tax-2015/fifth-schedule#aged_dependant_relative_personal_relief: 0
    gh:statutes/act-896/income-tax-2015/fifth-schedule#training_personal_relief: 0
    gh:statutes/act-896/income-tax-2015/fifth-schedule#resident_individual_personal_reliefs: 0

