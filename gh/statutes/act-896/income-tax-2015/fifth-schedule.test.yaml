- name: all_reliefs_combined_sum_under_section_51
  # Every relief branch at once:
  #   1(a) spouse                                   = 1,200
  #   1(b) disability: 40,000 x 0.25                = 10,000
  #   1(c) age 65 >= 60                             = 1,500
  #   1(d) education: min(2, 3) = 2 ; 2 x 600       = 1,200
  #   1(e) aged relative: min(1, 2) = 1 ; 1 x 1,000 = 1,000
  #   1(f) training: min(2,500, 2,000)              = 2,000
  # Total = 1,200 + 10,000 + 1,500 + 1,200 + 1,000 + 2,000
  #       = 11,200 + 1,500 + 1,200 + 1,000 + 2,000
  #       = 12,700 + 1,200 + 1,000 + 2,000
  #       = 13,900 + 1,000 + 2,000
  #       = 14,900 + 2,000
  #       = 16,900
  period:
    period_kind: tax_year
    start: '2026-01-01'
    end: '2026-12-31'
  input:
    gh:statutes/act-896/income-tax-2015/fifth-schedule#input.has_dependant_spouse: true
    gh:statutes/act-896/income-tax-2015/fifth-schedule#input.dependant_child_count: 2
    gh:statutes/act-896/income-tax-2015/fifth-schedule#input.has_disability: true
    gh:statutes/act-896/income-tax-2015/fifth-schedule#input.assessable_business_or_employment_income: 40000
    gh:statutes/act-896/income-tax-2015/fifth-schedule#input.age: 65
    gh:statutes/act-896/income-tax-2015/fifth-schedule#input.sponsored_children_in_education_count: 2
    gh:statutes/act-896/income-tax-2015/fifth-schedule#input.aged_dependant_relative_count: 1
    gh:statutes/act-896/income-tax-2015/fifth-schedule#input.has_undergone_skills_update_training: true
    gh:statutes/act-896/income-tax-2015/fifth-schedule#input.skills_update_training_cost: 2500
  output:
    gh:statutes/act-896/income-tax-2015/fifth-schedule#dependant_spouse_or_children_personal_relief: 1200
    gh:statutes/act-896/income-tax-2015/fifth-schedule#disability_personal_relief: 10000
    gh:statutes/act-896/income-tax-2015/fifth-schedule#old_age_personal_relief: 1500
    gh:statutes/act-896/income-tax-2015/fifth-schedule#child_education_personal_relief: 1200
    gh:statutes/act-896/income-tax-2015/fifth-schedule#aged_dependant_relative_personal_relief: 1000
    gh:statutes/act-896/income-tax-2015/fifth-schedule#training_personal_relief: 2000
    gh:statutes/act-896/income-tax-2015/fifth-schedule#resident_individual_personal_reliefs: 16900
