# Companion fixtures for the Ghana Education Trust Fund (Amendment) Act,
# 2025 (Act 1152) — the substituted section 3A GETFund Levy. Expected
# values computed by hand from the verbatim rate in the cited corpus
# provision (codex/gpt-5.5 generation; fixtures per axiom-encode#1060).
#
# Substituted s.3A: levy on non-exempt domestic supplies and non-exempt
# imports; "The rate of the Levy is two and a half per cent."
# Assent + gazette 24 December 2025; the 2.5% rate is unchanged from the
# prior Act 581 s.3A (Act 972 era), so GHAMOD GH_2025 comparisons carry.
# Validation year: 2026.

- name: domestic_supply_levied_at_2_5_percent
  # Non-exempt supplies worth GH¢60,000: 0.025 x 60,000 = 1,500.
  period:
    period_kind: tax_year
    start: '2026-01-01'
    end: '2026-12-31'
  input:
    gh:statutes/act-1152/ghana-education-trust-fund-amendment-2025/section-3a-getfund-levy-substituted#input.supply_of_goods_or_services_made_in_country: true
    gh:statutes/act-1152/ghana-education-trust-fund-amendment-2025/section-3a-getfund-levy-substituted#input.exempt_goods_or_services: false
    gh:statutes/act-1152/ghana-education-trust-fund-amendment-2025/section-3a-getfund-levy-substituted#input.import_of_goods_or_services: false
    gh:statutes/act-1152/ghana-education-trust-fund-amendment-2025/section-3a-getfund-levy-substituted#input.exempt_imports: false
    gh:statutes/act-1152/ghana-education-trust-fund-amendment-2025/section-3a-getfund-levy-substituted#input.taxable_value_of_goods_or_services: 60000
  output:
    gh:statutes/act-1152/ghana-education-trust-fund-amendment-2025/section-3a-getfund-levy-substituted#getfund_levy_imposed: holds
    gh:statutes/act-1152/ghana-education-trust-fund-amendment-2025/section-3a-getfund-levy-substituted#getfund_levy_amount: 1500

- name: exempt_supply_not_levied
  period:
    period_kind: tax_year
    start: '2026-01-01'
    end: '2026-12-31'
  input:
    gh:statutes/act-1152/ghana-education-trust-fund-amendment-2025/section-3a-getfund-levy-substituted#input.supply_of_goods_or_services_made_in_country: true
    gh:statutes/act-1152/ghana-education-trust-fund-amendment-2025/section-3a-getfund-levy-substituted#input.exempt_goods_or_services: true
    gh:statutes/act-1152/ghana-education-trust-fund-amendment-2025/section-3a-getfund-levy-substituted#input.import_of_goods_or_services: false
    gh:statutes/act-1152/ghana-education-trust-fund-amendment-2025/section-3a-getfund-levy-substituted#input.exempt_imports: false
    gh:statutes/act-1152/ghana-education-trust-fund-amendment-2025/section-3a-getfund-levy-substituted#input.taxable_value_of_goods_or_services: 60000
  output:
    gh:statutes/act-1152/ghana-education-trust-fund-amendment-2025/section-3a-getfund-levy-substituted#getfund_levy_imposed: not_holds
    gh:statutes/act-1152/ghana-education-trust-fund-amendment-2025/section-3a-getfund-levy-substituted#getfund_levy_amount: 0
