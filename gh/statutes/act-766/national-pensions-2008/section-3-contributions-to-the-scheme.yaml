format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: gh/statute/act-766/national-pensions-2008/section-3-contributions-to-the-scheme
  summary: |-
    National Pensions Act, 2008 (Act 766), section 3 sets the mandatory
    social-security contribution rates on a worker's salary. Section 3(1):
    the employer deducts "a worker's contribution of an amount equal to five
    and half per centum of the worker's salary". Section 3(2): the employer
    pays "an employer's contribution of an amount equal to thirteen per centum
    of the worker's salary". Section 3(3): "Out of the total contribution of
    eighteen and a half per centum" the employer remits "thirteen and half per
    centum to the first tier mandatory basic national social security scheme"
    and "five per centum to the second tier mandatory occupational pension
    scheme". The National Pensions (Amendment) Act, 2014 (Act 883) amended Act
    766 without changing these section 3 rates, so 5.5% and 13% (total 18.5%)
    remain the rates in force for the 2026 year of assessment, matching the
    GHAMOD outputs tscee_s (employee) and tscer_s (employer). Section 3(4)'s
    minimum-contribution floor — 18.5% of the approved monthly equivalent of
    the national daily minimum wage — turns on the national daily minimum wage
    fixed under a separate instrument (not Act 766) and is not encoded here;
    GHAMOD likewise applies the flat rates without the floor.
