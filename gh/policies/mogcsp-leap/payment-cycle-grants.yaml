              excerpt: "The grant amount for the 97th cycle"
    versions:
      - effective_from: '2025-06-30'
        formula: |-
          if not household_is_leap_beneficiary or eligible_member_count < leap_band_one_member_minimum: 0 else: if eligible_member_count < leap_band_two_member_minimum: leap_grant_per_cycle_one_member else: if eligible_member_count < leap_band_three_member_minimum: leap_grant_per_cycle_two_members else: if eligible_member_count < leap_band_four_member_minimum: leap_grant_per_cycle_three_members else: leap_grant_per_cycle_four_or_more_members
