        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: gh/policy/mogcsp-leap/payment-cycle-97-2025/block-1
              excerpt: "One-member household: GH₵320"
    versions:
      - effective_from: '2025-06-30'
        formula: |-
          320
